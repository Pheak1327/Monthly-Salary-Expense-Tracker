<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monthly Salary & Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>
        <span class="icon">💰</span>
        <span class="rgb-text">ប្រព័ន្ធគ្រប់គ្រង​ ប្រាក់ខែ និង ចំណាយ</span>
      </h1>

      <!-- ADD SALARY -->
      <div class="card">
        <h2 class="salary">💵 ដាក់ប្រាក់ខែ</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="salaryMonth">ខែ</label>
            <select id="salaryMonth">
              <option value="January">មករា</option>
              <option value="February">កុម្ភៈ</option>
              <option value="March">មីនា</option>
              <option value="April">មេសា</option>
              <option value="May">ឧសភា</option>
              <option value="June">មិថុនា</option>
              <option value="July">កក្កដា</option>
              <option value="August">សីហា</option>
              <option value="September">កញ្ញា</option>
              <option value="October">តុលា</option>
              <option value="November">វិច្ឆិកា</option>
              <option value="December">ធ្នូ</option>
            </select>
          </div>
          <div class="form-group">
            <label for="salaryYear">ឆ្នាំ</label>
            <input
              type="number"
              id="salaryYear"
              value="2026"
              min="2000"
              max="2100"
            />
          </div>
          <div class="form-group">
            <label for="salaryAmount">ចំនួនប្រាក់ខែ</label>
            <input
              type="number"
              id="salaryAmount"
              placeholder="e.g. 5000"
              min="0"
              step="0.01"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="salaryCurrency">រូបិយប័ណ្ណ</label>
            <select id="salaryCurrency">
              <option value="USD">USD ($)</option>
              <option value="KHR">KHR (៛)</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="salaryNotes">កំណត់ចំណាំ (Optional)</label>
            <input
              type="text"
              id="salaryNotes"
              placeholder="e.g. Bonus included"
            />
          </div>
        </div>
        <button onclick="addSalary()">Add Salary</button>
      </div>

      <!-- ADD EXPENSE -->
      <div class="card">
        <h2>
          <span class="icon">💸</span>
          <span class="expense"> បន្ថែមការចំណាយ </span>
        </h2>

        <div class="form-row">
          <div class="form-group">
            <label for="expensePeriod">ជ្រើសរើសខែប្រាក់</label>
            <select id="expensePeriod">
              <option value="">-- ជ្រើសរើសខែ --</option>
            </select>
          </div>
          <div class="form-group">
            <label for="expenseCategory">Category</label>
            <select id="expenseCategory">
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Rent">🏠 Rent</option>
              <option value="Utilities">💡 Utilities</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Healthcare">🏥 Healthcare</option>
              <option value="Education">📚 Education</option>
              <option value="Savings">🏦 Savings</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="expenseAmount">Amount</label>
            <input
              type="number"
              id="expenseAmount"
              placeholder="e.g. 150"
              min="0"
              step="0.01"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="expenseDate">Date</label>
            <input type="date" id="expenseDate" />
          </div>
          <div class="form-group">
            <label for="expenseNotes">Notes (Optional)</label>
            <input
              type="text"
              id="expenseNotes"
              placeholder="e.g. Grocery shopping"
            />
          </div>
        </div>
        <button class="btn-expense" onclick="addExpense()">Add Expense</button>
      </div>

      <!-- SUMMARY -->
      <div class="card">
        <h2>📊 Summary</h2>
        <div class="summary-grid">
          <div class="summary-box">
            <h3>Total Salary</h3>
            <div class="value" id="totalSalary">$0.00</div>
          </div>
          <div class="summary-box expense">
            <h3>Total Expenses</h3>
            <div class="value" id="totalExpense">$0.00</div>
          </div>
          <div class="summary-box net">
            <h3>Net Balance</h3>
            <div class="value" id="netBalance">$0.00</div>
          </div>
          <div class="summary-box count">
            <h3>Salary Entries</h3>
            <div class="value" id="salaryCount">0</div>
          </div>
          <div class="summary-box avg">
            <h3>Expense Count</h3>
            <div class="value" id="expenseCount">0</div>
          </div>
        </div>
      </div>

      <!-- HISTORY -->
      <div class="card">
        <h2>📋 History</h2>
        <div class="tabs">
          <button
            class="btn-tab active"
            onclick="switchTab('all')"
            id="tab-all"
          >
            All
          </button>
          <button class="btn-tab" onclick="switchTab('salary')" id="tab-salary">
            Salaries
          </button>
          <button
            class="btn-tab"
            onclick="switchTab('expense')"
            id="tab-expense"
          >
            Expenses
          </button>
        </div>

        <div class="month-filter">
          <label for="filterMonth" style="display: inline; margin-right: 10px"
            >Filter by Month:</label
          >
          <select
            id="filterMonth"
            onchange="renderTable()"
            style="width: auto; display: inline-block; padding: 8px 15px"
          >
            <option value="all">All Months</option>
          </select>
        </div>

        <div class="actions">
          <button onclick="exportData()" class="btn-export">
            📥 Export to CSV
          </button>
          <button onclick="clearAll()" class="btn-danger">🗑️ Clear All</button>
        </div>
        <div id="tableContainer">
          <div class="empty-state">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
              />
            </svg>
            <p>No entries yet. Add your first record above!</p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
